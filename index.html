<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pdf Maker</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Segoe UI', sans-serif;
  background: #ddd;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

/* ===== TOOLBAR ===== */
#toolbar {
  background: #1e2d3d;
  color: #e8e4de;
  padding: 6px 10px;
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  align-items: center;
  position: sticky;
  top: 0;
  z-index: 10;
  box-shadow: 0 2px 6px rgba(0,0,0,0.4);
}
.title { font-size: 13px; font-weight: 700; color: #e8a020; margin-right: 6px; }
.sep { width: 1px; height: 22px; background: rgba(255,255,255,0.2); margin: 0 2px; }
.btn {
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2);
  color: #e8e4de;
  padding: 3px 8px;
  border-radius: 3px;
  cursor: pointer;
  font-size: 12px;
  white-space: nowrap;
}
.btn:hover { background: rgba(255,255,255,0.22); }
.btn:disabled { opacity: 0.35; cursor: default; }
select.sel {
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.25);
  color: #e8e4de;
  padding: 3px 5px;
  border-radius: 3px;
  font-size: 12px;
  cursor: pointer;
}
select.sel option { background: #1e2d3d; }
.btn-print { background: #2e7d32; border-color: #388e3c; font-weight: 700; }
.btn-print:hover { background: #388e3c; }
.btn-danger { color: #ff8a80; }

/* ===== TAB BAR ===== */
#tab-bar {
  background: #162330;
  display: flex;
  align-items: center;
  gap: 0;
  padding: 0 10px;
  border-bottom: 2px solid #0e1920;
  overflow-x: auto;
  min-height: 32px;
}
#tab-bar::-webkit-scrollbar { height: 3px; }
#tab-bar::-webkit-scrollbar-thumb { background: #2a6496; border-radius: 2px; }

.tab {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 5px 14px 5px 12px;
  font-size: 12px;
  color: rgba(255,255,255,0.5);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  white-space: nowrap;
  user-select: none;
  transition: all 0.15s;
  position: relative;
  margin-bottom: -2px;
}
.tab:hover { color: rgba(255,255,255,0.85); background: rgba(255,255,255,0.05); }
.tab.active {
  color: #e8e4de;
  border-bottom-color: #e8a020;
  background: rgba(255,255,255,0.07);
}
.tab-close {
  font-size: 14px;
  line-height: 1;
  color: rgba(255,255,255,0.3);
  cursor: pointer;
  padding: 0 2px;
  border-radius: 2px;
}
.tab-close:hover { color: #ff6b6b; background: rgba(255,0,0,0.15); }
.tab-unsaved { width: 6px; height: 6px; border-radius: 50%; background: #e8a020; display: inline-block; }
#btn-new-tab {
  color: rgba(255,255,255,0.5);
  font-size: 18px;
  padding: 2px 10px;
  cursor: pointer;
  flex-shrink: 0;
}
#btn-new-tab:hover { color: #e8a020; }

/* ===== MAIN AREA ===== */
#main {
  flex: 1;
  padding: 20px;
  display: flex;
  justify-content: center;
}

/* ===== THE EDITOR ===== */
.editor {
  width: 210mm;
  background: white;
  box-shadow: 0 4px 16px rgba(0,0,0,0.25);
  padding: 6.35mm;
  font-family: 'Times New Roman', Times, serif;
  font-size: 11pt;
  line-height: 1.5;
  color: #111;
  outline: none;
  column-count: 2;
  column-gap: 5mm;
  column-rule: 0.5px solid #bbb;
  /* NO min-height — prevents extra blank pages */
  height: auto;
  overflow: visible;
}
.editor:empty::before {
  content: "এখানে ক্লিক করুন এবং টাইপ করুন অথবা পেস্ট করুন...";
  color: #bbb;
  font-style: italic;
}

/* Markdown-rendered styles inside editor */
.editor p { margin: 0 0 4px 0; }
.editor br { line-height: 1.5; }
.editor h1 { font-size: 16pt; font-weight: bold; margin: 8px 0 4px; line-height: 1.3; border-bottom: 1.5px solid #333; padding-bottom: 2px; }
.editor h2 { font-size: 14pt; font-weight: bold; margin: 6px 0 3px; line-height: 1.3; }
.editor h3 { font-size: 12pt; font-weight: bold; margin: 5px 0 2px; line-height: 1.3; }
.editor h4 { font-size: 11pt; font-weight: bold; margin: 4px 0 2px; }
.editor strong, .editor b { font-weight: bold; }
.editor em, .editor i { font-style: italic; }
.editor code {
  font-family: 'Courier New', monospace;
  background: #f4f4f4;
  padding: 0 3px;
  border-radius: 2px;
  font-size: 9pt;
}
.editor pre {
  background: #f4f4f4;
  border: 1px solid #ddd;
  padding: 6px 8px;
  border-radius: 3px;
  font-family: 'Courier New', monospace;
  font-size: 9pt;
  white-space: pre-wrap;
  word-break: break-word;
  margin: 4px 0;
  break-inside: avoid;
}
.editor blockquote {
  border-left: 3px solid #aaa;
  margin: 4px 0 4px 8px;
  padding-left: 8px;
  color: #555;
  font-style: italic;
}
.editor ul { margin: 2px 0 2px 18px; padding: 0; }
.editor ol { margin: 2px 0 2px 18px; padding: 0; }
.editor li { margin: 1px 0; }
.editor hr { border: none; border-top: 1px solid #888; margin: 5px 0; }
.editor table {
  width: 100%;
  border-collapse: collapse;
  margin: 4px 0;
  font-size: 10pt;
  break-inside: avoid;
}
.editor td, .editor th {
  border: 1px solid #444;
  padding: 2px 5px;
  vertical-align: top;
}
.editor th {
  background: #e0e0e0;
  font-weight: bold;
  text-align: left;
}
.editor img {
  max-width: 100%;
  height: auto;
  display: inline-block;
  margin: 4px 0;
}

/* ===== STATUS BAR ===== */
#statusbar {
  background: #1e2d3d;
  color: rgba(255,255,255,0.45);
  font-size: 11px;
  padding: 3px 12px;
  display: flex;
  gap: 16px;
  align-items: center;
}
#paste-status { color: #e8a020; }
#save-status { color: #81c784; }

/* ===== DIALOGS ===== */
#overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.45);
  z-index: 50;
}
.dialog {
  display: none;
  position: fixed; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  background: white;
  border-radius: 8px;
  padding: 20px;
  box-shadow: 0 8px 28px rgba(0,0,0,0.3);
  z-index: 51;
  width: 290px;
}
.dialog h3 { font-size: 14px; margin-bottom: 12px; color: #1e2d3d; }
.dialog label { display: block; font-size: 12px; color: #555; margin-bottom: 4px; }
.dialog input[type=number], .dialog input[type=text] {
  width: 100%; padding: 5px 8px;
  border: 1px solid #ccc; border-radius: 4px;
  font-size: 14px; margin-bottom: 10px;
}
.dialog .drow { display: flex; gap: 8px; margin-top: 8px; }
.dialog .drow button {
  flex: 1; padding: 7px; border: none;
  border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: 600;
}
.dbtn-ok { background: #2a6496; color: white; }
.dbtn-cancel { background: #eee; color: #444; }

/* Image dialog */
#img-preview-wrap {
  width: 100%; height: 110px;
  border: 2px dashed #ccc; border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 10px; cursor: pointer; overflow: hidden;
  background: #f9f9f9;
}
#img-preview-wrap:hover { border-color: #2a6496; }
#img-preview { max-width: 100%; max-height: 100%; display: none; }
#img-file-input { display: none; }
.size-presets { display: flex; gap: 4px; margin-bottom: 8px; }
.size-presets button {
  flex: 1; padding: 4px 2px; border: 1px solid #ccc;
  border-radius: 3px; font-size: 11px; cursor: pointer;
  background: #f0f0f0; color: #333;
}
.size-presets button:hover, .size-presets button.active {
  background: #2a6496; color: white; border-color: #2a6496;
}
.img-size-row { display: flex; gap: 6px; align-items: center; margin-bottom: 8px; }
.img-size-row label { margin-bottom: 0; white-space: nowrap; flex-shrink: 0; }
#img-width { width: 70px; margin-bottom: 0 !important; }

/* Progress overlay */
#paste-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.65);
  z-index: 100;
  align-items: center;
  justify-content: center;
}
#paste-overlay.show { display: flex; }
#paste-box {
  background: white;
  border-radius: 10px;
  padding: 24px 32px;
  text-align: center;
  box-shadow: 0 8px 30px rgba(0,0,0,0.4);
  min-width: 300px;
}
#paste-box h3 { font-size: 15px; color: #1e2d3d; margin-bottom: 10px; }
#ppbar-wrap { width: 100%; height: 10px; background: #eee; border-radius: 6px; overflow: hidden; margin: 8px 0; }
#ppbar { height: 100%; background: #2a6496; width: 0%; transition: width 0.1s; border-radius: 6px; }
#pptext { font-size: 12px; color: #666; margin-top: 4px; }

/* ===== PRINT ===== */
@media print {
  @page { size: A4; margin: 6.35mm; }
  body { background: white; }
  #toolbar, #tab-bar, #statusbar, #overlay, .dialog, #paste-overlay { display: none !important; }
  #main { padding: 0; display: block; }
  .editor {
    width: 100%;
    box-shadow: none;
    padding: 0;
    column-count: 2;
    column-gap: 4mm;
    column-rule: 0.5px solid #888;
    font-size: 10pt;
    height: auto !important;
    min-height: 0 !important;
  }
  .editor table { break-inside: avoid; }
  .editor th { background: #ddd !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .editor img { max-width: 100% !important; }
  .editor pre { break-inside: avoid; }
  /* Hide inactive tabs */
  .editor { display: none; }
  .editor.active-editor { display: block; }
}
</style>
</head>
<body>

<!-- TOOLBAR -->
<div id="toolbar">
  <span class="title">📄 ২-কলাম প্রিন্ট এডিটর</span>
  <div class="sep"></div>
  <button class="btn" onclick="f('bold')"><b>B</b></button>
  <button class="btn" onclick="f('italic')"><i>I</i></button>
  <button class="btn" onclick="f('underline')"><u>U</u></button>
  <div class="sep"></div>
  <button class="btn" id="btn-undo" onclick="doUndo()" title="Ctrl+Z">↩ Undo</button>
  <button class="btn" id="btn-redo" onclick="doRedo()" title="Ctrl+Y">↪ Redo</button>
  <div class="sep"></div>
  <select class="sel" onchange="f('fontSize',this.value); this.value=''">
    <option value="">সাইজ▾</option>
    <option value="1">৮</option>
    <option value="2">১০</option>
    <option value="3">১১</option>
    <option value="4">১৩</option>
    <option value="5">১৫</option>
    <option value="6">১৮</option>
    <option value="7">২৪</option>
  </select>
  <select class="sel" onchange="f('fontName',this.value); this.value=''">
    <option value="">ফন্ট▾</option>
    <option value="Times New Roman">Times New Roman</option>
    <option value="Arial">Arial</option>
    <option value="Calibri">Calibri</option>
    <option value="Noto Serif Bengali">Noto Serif Bengali</option>
    <option value="SolaimanLipi">SolaimanLipi</option>
  </select>
  <div class="sep"></div>
  <button class="btn" onclick="f('justifyLeft')">⬅</button>
  <button class="btn" onclick="f('justifyCenter')">↔</button>
  <button class="btn" onclick="f('justifyRight')">➡</button>
  <button class="btn" onclick="f('justifyFull')">⬌</button>
  <div class="sep"></div>
  <button class="btn" onclick="openT()">📊 টেবিল</button>
  <button class="btn" onclick="insHR()">— রেখা</button>
  <button class="btn" onclick="f('insertUnorderedList')">• লিস্ট</button>
  <button class="btn" onclick="f('insertOrderedList')">১. লিস্ট</button>
  <div class="sep"></div>
  <button class="btn" onclick="openImgDialog()">🖼️ ছবি</button>
  <div class="sep"></div>
  <button class="btn btn-danger" onclick="clearAll()">🗑 মুছুন</button>
  <button class="btn btn-print" onclick="window.print()">🖨️ প্রিন্ট</button>
</div>

<!-- TAB BAR -->
<div id="tab-bar">
  <!-- tabs injected by JS -->
  <span id="btn-new-tab" onclick="createTab()" title="নতুন ডকুমেন্ট">＋</span>
</div>

<!-- MAIN -->
<div id="main">
  <!-- editors injected by JS -->
</div>

<!-- STATUS BAR -->
<div id="statusbar">
  <span id="wc">শব্দ: ০</span>
  <span id="cc">অক্ষর: ০</span>
  <span id="paste-status"></span>
  <span id="save-status"></span>
  <span style="margin-left:auto;">মার্জিন ০.২৫″ | ২ কলাম | A4</span>
</div>

<!-- OVERLAY -->
<div id="overlay" onclick="closeAllDialogs()"></div>

<!-- TABLE DIALOG -->
<div class="dialog" id="tdialog">
  <h3>📊 টেবিল তৈরি করুন</h3>
  <label>সারি (Row)</label>
  <input type="number" id="trows" value="3" min="1" max="40">
  <label>কলাম (Column)</label>
  <input type="number" id="tcols" value="3" min="1" max="10">
  <label style="display:flex;align-items:center;gap:6px;margin-bottom:0;">
    <input type="checkbox" id="thead" checked> প্রথম সারি হেডার
  </label>
  <div class="drow">
    <button class="dbtn-ok" onclick="insTable()">তৈরি করুন</button>
    <button class="dbtn-cancel" onclick="closeAllDialogs()">বাতিল</button>
  </div>
</div>

<!-- IMAGE DIALOG -->
<div class="dialog" id="imgdialog">
  <h3>🖼️ ছবি যুক্ত করুন</h3>
  <div id="img-preview-wrap" onclick="document.getElementById('img-file-input').click()">
    <img id="img-preview" src="" alt="">
    <span id="img-choose-label" style="font-size:12px;color:#888;text-align:center;">📂 ক্লিক করুন ছবি বেছে নিতে<br><small style="color:#bbb;">JPG, PNG, GIF, WebP</small></span>
  </div>
  <input type="file" id="img-file-input" accept="image/*" onchange="onImgFile(this)">
  <label>আকার:</label>
  <div class="size-presets">
    <button onclick="setPreset(25,'%',this)">২৫%</button>
    <button onclick="setPreset(50,'%',this)">৫০%</button>
    <button onclick="setPreset(75,'%',this)">৭৫%</button>
    <button onclick="setPreset(100,'%',this)">১০০%</button>
  </div>
  <div class="img-size-row">
    <label>মান:</label>
    <input type="number" id="img-width" value="300" min="10" max="2000">
    <select class="sel" id="img-unit" style="flex:1;">
      <option value="px">px</option>
      <option value="%">%</option>
    </select>
  </div>
  <label style="display:flex;align-items:center;gap:6px;margin-bottom:8px;">
    <input type="checkbox" id="img-center" checked> মাঝে রাখুন
  </label>
  <div class="drow">
    <button class="dbtn-ok" onclick="insertImage()">যুক্ত করুন</button>
    <button class="dbtn-cancel" onclick="closeAllDialogs()">বাতিল</button>
  </div>
</div>

<!-- PASTE PROGRESS -->
<div id="paste-overlay">
  <div id="paste-box">
    <h3>⏳ প্রসেস হচ্ছে...</h3>
    <div id="ppbar-wrap"><div id="ppbar"></div></div>
    <div id="pptext">শুরু হচ্ছে...</div>
  </div>
</div>

<script>
/* ================================================================
   STORAGE KEY PREFIX
   ================================================================ */
const STORE_KEY = 'pe_v2_';
const TABS_KEY  = STORE_KEY + 'tabs';
const ACTIVE_KEY = STORE_KEY + 'active';

/* ================================================================
   TAB & EDITOR MANAGEMENT
   ================================================================ */
let tabs = [];        // [{id, title, html}]
let activeId = null;

function getEditor(id) { return document.getElementById('ed_' + id); }
function getActiveEditor() { return getEditor(activeId); }

function createTab(title, html, id) {
  id = id || ('t' + Date.now());
  title = title || 'ডকুমেন্ট ' + (tabs.length + 1);
  html = html || '';

  // Tab element
  const tab = document.createElement('div');
  tab.className = 'tab';
  tab.id = 'tab_' + id;
  tab.dataset.id = id;
  tab.innerHTML = `<span class="tab-title">${escHtml(title)}</span><span class="tab-unsaved" style="display:none;"></span><span class="tab-close" onclick="closeTab('${id}',event)">×</span>`;
  tab.onclick = (e) => { if (!e.target.classList.contains('tab-close')) switchTab(id); };
  document.getElementById('btn-new-tab').before(tab);

  // Editor element
  const ed = document.createElement('div');
  ed.className = 'editor';
  ed.id = 'ed_' + id;
  ed.contentEditable = 'true';
  ed.spellcheck = false;
  ed.style.display = 'none';
  ed.innerHTML = html;
  document.getElementById('main').appendChild(ed);

  // Wire events
  ed.addEventListener('input', () => { onEditorInput(id); });
  ed.addEventListener('paste', (e) => handlePaste(e, id));

  tabs.push({ id, title, html: ed.innerHTML });
  switchTab(id);
  return id;
}

function switchTab(id) {
  // Save current
  if (activeId) saveEditorState(activeId);

  activeId = id;

  // Update tab UI
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  const tabEl = document.getElementById('tab_' + id);
  if (tabEl) tabEl.classList.add('active');

  // Show/hide editors
  document.querySelectorAll('.editor').forEach(e => {
    e.style.display = 'none';
    e.classList.remove('active-editor');
  });
  const ed = getEditor(id);
  if (ed) {
    ed.style.display = 'block';
    ed.classList.add('active-editor');
  }

  // Reset undo/redo for this tab
  loadUndoStack(id);
  countWords();
  updateUndoBtns();
}

function closeTab(id, e) {
  e && e.stopPropagation();
  if (tabs.length === 1) { alert('অন্তত একটি ডকুমেন্ট থাকা দরকার।'); return; }
  if (!confirm('এই ডকুমেন্টটি বন্ধ করবেন?\n(localStorage থেকেও মুছে যাবে)')) return;

  const idx = tabs.findIndex(t => t.id === id);
  tabs.splice(idx, 1);

  document.getElementById('tab_' + id)?.remove();
  document.getElementById('ed_' + id)?.remove();

  // Remove from storage
  localStorage.removeItem(STORE_KEY + 'doc_' + id);
  localStorage.removeItem(STORE_KEY + 'undo_' + id);

  if (activeId === id) {
    const next = tabs[Math.min(idx, tabs.length - 1)];
    switchTab(next.id);
  }
  persistTabList();
}

function renameTab(id) {
  const t = tabs.find(t => t.id === id);
  if (!t) return;
  const newTitle = prompt('ডকুমেন্টের নাম:', t.title);
  if (!newTitle) return;
  t.title = newTitle.trim();
  const el = document.querySelector('#tab_' + id + ' .tab-title');
  if (el) el.textContent = t.title;
  persistTabList();
}

/* Double-click tab to rename */
document.getElementById('tab-bar').addEventListener('dblclick', e => {
  const tab = e.target.closest('.tab');
  if (tab) renameTab(tab.dataset.id);
});

/* ================================================================
   PERSISTENCE — localStorage
   ================================================================ */
let saveTimers = {};

function onEditorInput(id) {
  markUnsaved(id);
  scheduleSave(id);
  if (id === activeId) { scheduleWordCount(); scheduleUndoSave(id); }
}

function markUnsaved(id) {
  const dot = document.querySelector('#tab_' + id + ' .tab-unsaved');
  if (dot) dot.style.display = 'inline-block';
  document.getElementById('save-status').textContent = '● সংরক্ষণ হয়নি';
}

function markSaved(id) {
  const dot = document.querySelector('#tab_' + id + ' .tab-unsaved');
  if (dot) dot.style.display = 'none';
  if (id === activeId) {
    const ss = document.getElementById('save-status');
    ss.textContent = '✓ সংরক্ষিত';
    setTimeout(() => { if (ss.textContent === '✓ সংরক্ষিত') ss.textContent = ''; }, 2500);
  }
}

function scheduleSave(id) {
  clearTimeout(saveTimers[id]);
  saveTimers[id] = setTimeout(() => saveEditorState(id), 800);
}

function saveEditorState(id) {
  const ed = getEditor(id);
  if (!ed) return;
  const html = ed.innerHTML;
  const t = tabs.find(t => t.id === id);
  if (t) t.html = html;
  try {
    localStorage.setItem(STORE_KEY + 'doc_' + id, html);
    persistTabList();
    markSaved(id);
  } catch(e) {
    // Storage full — show warning
    document.getElementById('save-status').textContent = '⚠ সংরক্ষণ ব্যর্থ (স্টোরেজ পূর্ণ)';
  }
}

function persistTabList() {
  const list = tabs.map(t => ({ id: t.id, title: t.title }));
  localStorage.setItem(TABS_KEY, JSON.stringify(list));
  localStorage.setItem(ACTIVE_KEY, activeId);
}

function loadFromStorage() {
  try {
    const list = JSON.parse(localStorage.getItem(TABS_KEY) || '[]');
    const savedActive = localStorage.getItem(ACTIVE_KEY);
    if (list.length === 0) { createTab(); return; }
    list.forEach(({ id, title }) => {
      const html = localStorage.getItem(STORE_KEY + 'doc_' + id) || '';
      createTab(title, html, id);
    });
    if (savedActive && tabs.find(t => t.id === savedActive)) {
      switchTab(savedActive);
    }
  } catch(e) {
    createTab();
  }
}

/* ================================================================
   UNDO / REDO — per-tab stacks (stored in memory; snapshot in localStorage)
   ================================================================ */
const undoStacks = {};
const redoStacks = {};
let undoTimers = {};
let lastHTML = {};

function loadUndoStack(id) {
  if (!undoStacks[id]) undoStacks[id] = [];
  if (!redoStacks[id]) redoStacks[id] = [];
  const ed = getEditor(id);
  if (ed) lastHTML[id] = ed.innerHTML;
}

function scheduleUndoSave(id) {
  clearTimeout(undoTimers[id]);
  undoTimers[id] = setTimeout(() => snapshotUndo(id), 500);
}

function snapshotUndo(id) {
  const ed = getEditor(id);
  if (!ed) return;
  const html = ed.innerHTML;
  if (html === lastHTML[id]) return;
  if (!undoStacks[id]) undoStacks[id] = [];
  undoStacks[id].push(lastHTML[id] || '');
  if (undoStacks[id].length > 80) undoStacks[id].shift();
  redoStacks[id] = [];
  lastHTML[id] = html;
  updateUndoBtns();
}

function doUndo() {
  const id = activeId;
  snapshotUndo(id);
  if (!undoStacks[id] || undoStacks[id].length === 0) return;
  const prev = undoStacks[id].pop();
  if (!redoStacks[id]) redoStacks[id] = [];
  redoStacks[id].push(getEditor(id).innerHTML);
  getEditor(id).innerHTML = prev;
  lastHTML[id] = prev;
  updateUndoBtns();
  countWords();
  scheduleSave(id);
}

function doRedo() {
  const id = activeId;
  if (!redoStacks[id] || redoStacks[id].length === 0) return;
  const next = redoStacks[id].pop();
  if (!undoStacks[id]) undoStacks[id] = [];
  undoStacks[id].push(getEditor(id).innerHTML);
  getEditor(id).innerHTML = next;
  lastHTML[id] = next;
  updateUndoBtns();
  countWords();
  scheduleSave(id);
}

function updateUndoBtns() {
  const id = activeId;
  document.getElementById('btn-undo').disabled = !undoStacks[id] || undoStacks[id].length === 0;
  document.getElementById('btn-redo').disabled = !redoStacks[id] || redoStacks[id].length === 0;
}

/* ================================================================
   FORMAT COMMANDS
   ================================================================ */
function f(cmd, val) {
  const ed = getActiveEditor();
  if (!ed) return;
  snapshotUndo(activeId);
  ed.focus();
  document.execCommand(cmd, false, val || null);
  scheduleSave(activeId);
  countWords();
}

function insHR() {
  snapshotUndo(activeId);
  const ed = getActiveEditor(); ed.focus();
  document.execCommand('insertHTML', false, '<hr style="border:none;border-top:1px solid #888;margin:3px 0;">');
  scheduleSave(activeId);
}

function clearAll() {
  if (!confirm('এই ডকুমেন্টের সব লেখা মুছে দেবেন?')) return;
  snapshotUndo(activeId);
  const ed = getActiveEditor();
  ed.innerHTML = '';
  lastHTML[activeId] = '';
  countWords();
  scheduleSave(activeId);
}

  imgDataURL = null;
  document.getElementById('img-preview').style.display = 'none';
  document.getElementById('img-preview').src = '';
  document.getElementById('img-choose-label').style.display = 'block';
  document.getElementById('img-file-input').value = '';
  document.getElementById('img-width').value = 300;
  document.getElementById('img-unit').value = 'px';

  document.querySelectorAll('.size-presets button').forEach(b => b.classList.remove('active'));
  document.getElementById('imgdialog').style.display = 'block';
  document.getElementById('overlay').style.display = 'block';
}
function onImgFile(input) {
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    imgDataURL = e.target.result;
    const p = document.getElementById('img-preview');
    p.src = imgDataURL; p.style.display = 'block';
    document.getElementById('img-choose-label').style.display = 'none';
  };
  reader.readAsDataURL(file);
}
function setPreset(val, unit, btn) {
  document.getElementById('img-width').value = val;
  document.getElementById('img-unit').value = unit;
  document.querySelectorAll('.size-presets button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}
function insertImage() {
  if (!imgDataURL) { alert('আগে একটি ছবি বেছে নিন।'); return; }
  const width = document.getElementById('img-width').value || 300;
  const unit = document.getElementById('img-unit').value;
  const centered = document.getElementById('img-center').checked;
  const wrapStyle = centered ? 'display:block;text-align:center;margin:4px 0;' : 'display:block;margin:4px 0;';
  const html = `<div style="${wrapStyle}"><img src="${imgDataURL}" style="width:${width}${unit};max-width:100%;height:auto;" alt="ছবি"></div><p></p>`;
  closeAllDialogs();
  snapshotUndo(activeId);
  const ed = getActiveEditor(); ed.focus();
  if (savedRange) {
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(savedRange);
  }
  document.execCommand('insertHTML', false, html);
  scheduleSave(activeId);
}

/* ================================================================
   MARKDOWN → HTML PARSER
   Handles AI output: ##, **, *, `code`, tables, blockquote, lists
   ================================================================ */
function parseMarkdown(text) {
  const lines = text.split('\n');
  let html = '';
  let inTable = false;
  let inPre = false;
  let tableLines = [];
  let listStack = [];   // track open ul/ol

  function closeLists() {
    while (listStack.length > 0) {
      html += listStack.pop() === 'ul' ? '</ul>' : '</ol>';
    }
  }
  function closeTable() {
    if (!inTable) return;
    // Render table
    if (tableLines.length >= 2) {
      html += '<table style="width:100%;border-collapse:collapse;">';
      tableLines.forEach((row, i) => {
        const cells = row.split('|').map(c => c.trim()).filter((c,ci,arr) => ci !== 0 || c !== '').filter((c,ci,arr) => ci !== arr.length-1 || c !== '');
        if (i === 1 && cells.every(c => /^[-:]+$/.test(c))) return; // separator row
        html += '<tr>';
        cells.forEach(cell => {
          if (i === 0) html += `<th style="border:1px solid #444;padding:2px 5px;background:#e0e0e0;text-align:left;">${inlineMarkdown(cell)}</th>`;
          else html += `<td style="border:1px solid #444;padding:2px 5px;">${inlineMarkdown(cell)}</td>`;
        });
        html += '</tr>';
      });
      html += '</table>';
    }
    tableLines = [];
    inTable = false;
  }

  for (let i = 0; i < lines.length; i++) {
    let line = lines[i];

    // Code block
    if (line.trim().startsWith('```')) {
      closeLists();
      closeTable();
      if (!inPre) {
        const lang = line.trim().slice(3).trim();
        html += `<pre${lang ? ` data-lang="${escHtml(lang)}"` : ''}>`;
        inPre = true;
      } else {
        html += '</pre>';
        inPre = false;
      }
      continue;
    }
    if (inPre) {
      html += escHtml(line) + '\n';
      continue;
    }

    // Table row
    if (line.trim().startsWith('|') && line.trim().endsWith('|')) {
      closeLists();
      if (!inTable) inTable = true;
      tableLines.push(line.trim());
      continue;
    } else if (inTable) {
      closeTable();
    }

    // Blank line
    if (line.trim() === '') {
      closeLists();
      html += '<p></p>';
      continue;
    }

    // Headings
    const h4 = line.match(/^####\s+(.*)/);
    const h3 = line.match(/^###\s+(.*)/);
    const h2 = line.match(/^##\s+(.*)/);
    const h1 = line.match(/^#\s+(.*)/);
    if (h4) { closeLists(); html += `<h4>${inlineMarkdown(h4[1])}</h4>`; continue; }
    if (h3) { closeLists(); html += `<h3>${inlineMarkdown(h3[1])}</h3>`; continue; }
    if (h2) { closeLists(); html += `<h2>${inlineMarkdown(h2[1])}</h2>`; continue; }
    if (h1) { closeLists(); html += `<h1>${inlineMarkdown(h1[1])}</h1>`; continue; }

    // Blockquote
    const bq = line.match(/^>\s*(.*)/);
    if (bq) { closeLists(); html += `<blockquote>${inlineMarkdown(bq[1])}</blockquote>`; continue; }

    // Horizontal rule
    if (/^(-{3,}|\*{3,}|_{3,})$/.test(line.trim())) {
      closeLists();
      html += '<hr style="border:none;border-top:1px solid #888;margin:5px 0;">';
      continue;
    }

    // Unordered list
    const ulMatch = line.match(/^(\s*)([-*+])\s+(.*)/);
    if (ulMatch) {
      if (listStack[listStack.length-1] !== 'ul') {
        closeLists();
        html += '<ul>';
        listStack.push('ul');
      }
      html += `<li>${inlineMarkdown(ulMatch[3])}</li>`;
      continue;
    }

    // Ordered list
    const olMatch = line.match(/^(\s*)\d+\.\s+(.*)/);
    if (olMatch) {
      if (listStack[listStack.length-1] !== 'ol') {
        closeLists();
        html += '<ol>';
        listStack.push('ol');
      }
      html += `<li>${inlineMarkdown(olMatch[2])}</li>`;
      continue;
    }

    closeLists();
    html += `<p>${inlineMarkdown(line)}</p>`;
  }

  closeLists();
  closeTable();
  if (inPre) html += '</pre>';

  return html;
}

function inlineMarkdown(text) {
  // Escape HTML first
  text = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  // Bold+italic
  text = text.replace(/\*\*\*(.*?)\*\*\*/g, '<strong><em>$1</em></strong>');
  text = text.replace(/\_\_\_(.*?)\_\_\_/g, '<strong><em>$1</em></strong>');
  // Bold
  text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  text = text.replace(/\_\_(.*?)\_\_/g, '<strong>$1</strong>');
  // Italic
  text = text.replace(/\*(.*?)\*/g, '<em>$1</em>');
  text = text.replace(/\_(.*?)\_/g, '<em>$1</em>');
  // Inline code
  text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
  // Strikethrough
  text = text.replace(/~~(.*?)~~/g, '<del>$1</del>');
  return text;
}

function isMarkdown(text) {
  // Detect if text contains common markdown patterns
  return /^#{1,4}\s/m.test(text) ||
         /\*\*[^*]+\*\*/m.test(text) ||
         /^\s*[-*+]\s+/m.test(text) ||
         /^\s*\d+\.\s+/m.test(text) ||
         /^\|.*\|/m.test(text) ||
         /^```/m.test(text) ||
         /^>/m.test(text);
}

/* ================================================================
   PASTE HANDLER — markdown + large text + HTML
   ================================================================ */
async function handlePaste(e, tabId) {
  e.preventDefault();
  snapshotUndo(tabId);

  const html = e.clipboardData.getData('text/html');
  const text = e.clipboardData.getData('text/plain');
  const totalLen = (html || text || '').length;
  const isLarge = totalLen > 50000;

  if (isLarge) showProgress(5, 'বড় কন্টেন্ট শনাক্ত...');

  try {
    let finalHTML = '';

    if (text && isMarkdown(text)) {
      // MARKDOWN PATH
      if (isLarge) showProgress(20, 'Markdown পার্স হচ্ছে...');
      await yld();
      finalHTML = await chunkedMarkdown(text, isLarge);

    } else if (html) {
      // HTML PATH
      finalHTML = isLarge ? await processHTMLLarge(html) : processHTMLSmall(html);

    } else if (text) {
      // PLAIN TEXT PATH
      finalHTML = isLarge ? await processTextLarge(text) : processTextSmall(text);
    }

    if (isLarge) { showProgress(95, 'এডিটরে যুক্ত হচ্ছে...'); await yld(); }

    const ed = getEditor(tabId);
    if (totalLen > 200000) {
      // Direct DOM append (faster for huge content)
      const tmp = document.createElement('div');
      tmp.innerHTML = finalHTML;
      while (tmp.firstChild) ed.appendChild(tmp.firstChild);
    } else {
      ed.focus();
      document.execCommand('insertHTML', false, finalHTML);
    }

  } catch(err) { console.error('Paste error:', err); }

  hideProgress();
  scheduleSave(tabId);
  scheduleWordCount();

  if (totalLen > 10000) {
    const ps = document.getElementById('paste-status');
    ps.textContent = `✓ ${totalLen.toLocaleString()} অক্ষর পেস্ট হয়েছে`;
    setTimeout(() => { ps.textContent = ''; }, 4000);
  }
}

async function chunkedMarkdown(text, isLarge) {
  const CHUNK = 10000;
  if (!isLarge || text.length <= CHUNK) {
    return parseMarkdown(text);
  }
  // Split on double newline boundaries to avoid cutting mid-paragraph
  const parts = text.split(/\n\n/);
  let result = '';
  let buf = '';
  let done = 0;
  for (const part of parts) {
    buf += part + '\n\n';
    if (buf.length >= CHUNK) {
      result += parseMarkdown(buf);
      done += buf.length;
      buf = '';
      showProgress(20 + Math.round((done / text.length) * 70), `Markdown: ${done.toLocaleString()} / ${text.length.toLocaleString()} অক্ষর...`);
      await yld();
    }
  }
  if (buf) result += parseMarkdown(buf);
  return result;
}

async function processHTMLLarge(html) {
  showProgress(10, 'HTML পার্স হচ্ছে...');
  await yld();
  const parser = new DOMParser();
  const doc = parser.parseFromString(html, 'text/html');
  showProgress(25, 'টেবিল ঠিক করা হচ্ছে...');
  await yld();
  doc.querySelectorAll('table').forEach(t => { t.setAttribute('style','width:100%;border-collapse:collapse;'); t.removeAttribute('class'); });
  doc.querySelectorAll('td,th').forEach(cell => { const isH = cell.tagName==='TH'; cell.setAttribute('style',`border:1px solid #444;padding:2px 5px;vertical-align:top;${isH?'background:#e0e0e0;font-weight:bold;':''}`); });
  doc.querySelectorAll('tr').forEach(r => r.removeAttribute('style'));
  doc.querySelectorAll('meta,style,link,script').forEach(n => n.remove());
  showProgress(50, 'ফরম্যাটিং প্রসেস হচ্ছে...');
  await yld();
  const spans = Array.from(doc.querySelectorAll('span'));
  for (let i = 0; i < spans.length; i += 300) {
    spans.slice(i,i+300).forEach(flattenSpan);
    showProgress(50 + Math.round((i/spans.length)*40), `স্প্যান: ${Math.min(i+300,spans.length)}/${spans.length}`);
    await yld();
  }
  return doc.body.innerHTML;
}

function processHTMLSmall(html) {
  const doc = new DOMParser().parseFromString(html, 'text/html');
  doc.querySelectorAll('table').forEach(t => { t.setAttribute('style','width:100%;border-collapse:collapse;'); t.removeAttribute('class'); });
  doc.querySelectorAll('td,th').forEach(cell => { const isH=cell.tagName==='TH'; cell.setAttribute('style',`border:1px solid #444;padding:2px 5px;vertical-align:top;${isH?'background:#e0e0e0;font-weight:bold;':''}`); });
  doc.querySelectorAll('tr').forEach(r => r.removeAttribute('style'));
  doc.querySelectorAll('meta,style,link,script').forEach(n => n.remove());
  doc.querySelectorAll('span').forEach(flattenSpan);
  return doc.body.innerHTML;
}

function flattenSpan(span) {
  if (!span.parentNode) return;
  const fw = span.style.fontWeight, fs = span.style.fontStyle;
  const isBold = fw==='bold'||parseInt(fw)>=700, isItalic = fs==='italic';
  if (isBold&&isItalic) { const b=document.createElement('b'); const it=document.createElement('i'); it.innerHTML=span.innerHTML; b.appendChild(it); span.replaceWith(b); }
  else if (isBold) { const b=document.createElement('b'); b.innerHTML=span.innerHTML; span.replaceWith(b); }
  else if (isItalic) { const it=document.createElement('i'); it.innerHTML=span.innerHTML; span.replaceWith(it); }
  else span.replaceWith(...span.childNodes);
}

async function processTextLarge(text) {
  const lines = text.split('\n');
  let result = '';
  const BATCH = 500;
  for (let i = 0; i < lines.length; i += BATCH) {
    const chunk = lines.slice(i,i+BATCH).join('\n');
    result += chunk.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
    showProgress(10+Math.round(((i+BATCH)/lines.length)*85), `${Math.min(i+BATCH,lines.length).toLocaleString()} / ${lines.length.toLocaleString()} লাইন`);
    await yld();
  }
  return result;
}

function processTextSmall(text) {
  const lines = text.trim().split('\n');
  const isTab = lines.length >= 2 && lines.every(l => l.includes('\t'));
  if (isTab) {
    let h = '<table style="width:100%;border-collapse:collapse;">';
    lines.forEach((line,i) => {
      h += '<tr>';
      line.split('\t').forEach(cell => {
        const v = escHtml(cell);
        if (i===0) h += `<th style="border:1px solid #444;padding:2px 5px;background:#e0e0e0;font-weight:bold;">${v}</th>`;
        else h += `<td style="border:1px solid #444;padding:2px 5px;">${v}</td>`;
      });
      h += '</tr>';
    });
    return h + '</table><p></p>';
  }
  return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

function yld() { return new Promise(r => setTimeout(r, 0)); }

/* ================================================================
   PROGRESS BAR
   ================================================================ */
function showProgress(pct, msg) {
  document.getElementById('paste-overlay').classList.add('show');
  document.getElementById('ppbar').style.width = Math.min(pct,100) + '%';
  document.getElementById('pptext').textContent = msg;
}
function hideProgress() {
  document.getElementById('paste-overlay').classList.remove('show');
}

/* ================================================================
   WORD COUNT
   ================================================================ */
let wcTimer = null;
function scheduleWordCount() {
  clearTimeout(wcTimer);
  wcTimer = setTimeout(countWords, 300);
}
function countWords() {
  const ed = getActiveEditor();
  const t = ed ? (ed.innerText || '') : '';
  const w = t.trim() ? t.trim().split(/\s+/).length : 0;
  const c = t.replace(/\s/g,'').length;
  document.getElementById('wc').textContent = 'শব্দ: ' + w.toLocaleString();
  document.getElementById('cc').textContent = 'অক্ষর: ' + c.toLocaleString();
}

/* ================================================================
   HELPERS
   ================================================================ */
function escHtml(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ================================================================
   KEYBOARD SHORTCUTS
   ================================================================ */
document.addEventListener('keydown', e => {
  if (e.ctrlKey && e.key === 'p') { e.preventDefault(); window.print(); }
  if (e.ctrlKey && !e.shiftKey && e.key === 'z') { e.preventDefault(); doUndo(); }
  if (e.ctrlKey && (e.key === 'y' || (e.shiftKey && e.key === 'z'))) { e.preventDefault(); doRedo(); }
  // Ctrl+T: new tab
  if (e.ctrlKey && e.key === 't' && !e.shiftKey) { e.preventDefault(); createTab(); }
});

/* ================================================================
   STORAGE USAGE INDICATOR
   ================================================================ */
function checkStorage() {
  try {
    let used = 0;
    for (const k in localStorage) {
      if (k.startsWith(STORE_KEY)) used += (localStorage[k]||'').length;
    }
    const kb = (used / 1024).toFixed(0);
    // Show if > 2MB
    if (used > 2 * 1024 * 1024) {
      document.getElementById('save-status').textContent = `⚠ স্টোরেজ ${kb}KB ব্যবহৃত`;
    }
  } catch(e) {}
}

/* ================================================================
   BOOT
   ================================================================ */
loadFromStorage();
updateUndoBtns();
setInterval(() => {
  // Auto-save active tab every 30s
  if (activeId) saveEditorState(activeId);
  checkStorage();
}, 30000);

// Warn before close if unsaved
window.addEventListener('beforeunload', e => {
  if (activeId) saveEditorState(activeId);
});
